<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>課後後測｜企業 AI 知識化應用</title>
<style>
  :root{--navy:#10243E;--teal:#00A6A6;--gold:#C99A3E;--ink:#172033;--ink-soft:#415066;--ink-faint:#7B8796;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:"Noto Sans TC","Microsoft JhengHei","PingFang TC",sans-serif;background:linear-gradient(135deg,#10243E,#3a2f14 55%,#C99A3E);color:var(--ink);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:32px 18px;}
  .card{background:#fff;border-radius:22px;box-shadow:0 18px 50px rgba(0,0,0,.3);max-width:640px;width:100%;padding:42px 40px 36px;text-align:center;}
  .eyebrow{font-size:15px;font-weight:700;letter-spacing:3px;color:var(--gold);}
  h1{font-size:34px;font-weight:800;color:var(--navy);margin:8px 0 4px;letter-spacing:-.5px;}
  .sub{font-size:16px;color:var(--ink-soft);margin-bottom:24px;}
  .qr{width:332px;max-width:82vw;margin:0 auto 8px;padding:16px;background:#fff;border:2px solid #F0EADD;border-radius:16px;}
  .qr img{width:300px;max-width:78vw;height:auto;display:block;margin:0 auto;image-rendering:pixelated;}
  .scan{font-size:15px;color:var(--ink-faint);margin-bottom:18px;}
  .btn{display:inline-block;text-decoration:none;background:var(--gold);color:#fff;font-size:19px;font-weight:800;padding:15px 34px;border-radius:12px;box-shadow:0 8px 22px rgba(201,154,62,.4);transition:transform .15s,box-shadow .15s;}
  .btn:hover{transform:translateY(-2px);box-shadow:0 12px 28px rgba(201,154,62,.5);}
  .url{margin-top:16px;font-size:20px;font-weight:700;color:var(--navy);word-break:break-all;}
  .url a{color:var(--navy);text-decoration:none;border-bottom:2px solid var(--gold);}
  .notes{margin-top:24px;padding-top:18px;border-top:1px solid #EEF2F6;display:flex;gap:10px;justify-content:center;flex-wrap:wrap;}
  .chip{font-size:13.5px;color:var(--ink-soft);background:#F1F4F7;border-radius:999px;padding:7px 15px;}
  .chip b{color:var(--navy);}
  .foot{margin-top:22px;font-size:12.5px;color:var(--ink-faint);}
</style>
</head>
<body>
  <div class="card">
